<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartSchedule — Productos</title>
  <link rel="stylesheet" href="/css/estilos.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-header"><h2>📅 SmartSchedule</h2><span>Grupo 3 — USFX</span></div>
    <nav class="sidebar-nav">
      <div class="nav-section">General</div>
      <a href="/panel.html" class="nav-link"><span class="icon">🏠</span> Panel</a>
      <div class="nav-section" id="nav-admin-section" style="display:none">Admin</div>
      <a href="/usuarios/list.html" class="nav-link" id="nav-users" style="display:none"><span class="icon">👥</span> Usuarios</a>
      <a href="/productos/pendiente.html" class="nav-link" id="nav-pending" style="display:none"><span class="icon">⏳</span> Pendientes</a>
      <div class="nav-section">Productos</div>
      <a href="/productos/list.html" class="nav-link active"><span class="icon">📦</span> Ver Productos</a>
      <a href="/productos/create.html" class="nav-link" id="nav-create" style="display:none"><span class="icon">➕</span> Nuevo Producto</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="user-avatar" id="user-avatar">?</div>
        <div class="user-info"><strong id="user-name">...</strong><small id="user-role"></small></div>
      </div>
      <button onclick="logout()" class="btn btn-secondary btn-full btn-sm">Cerrar Sesión</button>
    </div>
  </aside>

  <main class="main-content">
    <div class="topbar">
      <span class="topbar-title">Productos / Servicios</span>
      <a href="/productos/create.html" class="btn btn-success btn-sm" id="btn-create" style="display:none">+ Nuevo Producto</a>
    </div>
    <div class="page-content">
      <div id="alert-global"></div>
      <div class="card" id="content">
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>Título</th>
                <th>Categoría</th>
                <th>Precio</th>
                <th>Estado</th>
                <th>Ofertante</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="products-tbody">
              <tr><td colspan="6" class="loading">Cargando...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/productos.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  const user = await getCurrentUser();
  if (!user) return;
  if (user.rol === 'admin') {
    document.getElementById('nav-admin-section').style.display = 'block';
    document.getElementById('nav-users').style.display = 'flex';
    document.getElementById('nav-pending').style.display = 'flex';
  }
  if (user.rol !== 'demandante') {
    document.getElementById('nav-create').style.display = 'flex';
    document.getElementById('btn-create').style.display = 'inline-flex';
  }
});
</script>
</body>
</html>
